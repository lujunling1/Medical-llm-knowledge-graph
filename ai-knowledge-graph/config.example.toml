[llm]
model = "gpt-4o-mini"
base_url = "https://api.openai.com/v1/chat/completions"
api_key_env = "OPENAI_API_KEY"
max_tokens = 4096
temperature = 0.2

[extraction]
schema = "med-llm"
chunk_size = 1200
overlap = 100
med_llm_prompt = "prompts/med_llm.txt"
generic_prompt = "prompts/generic.txt"

[normalization]
lowercase_generic_triples = false
deduplicate = true
